name: crop_management
version: "0.1.0"
description: >
  Precision agriculture crop management environment with partial observability.
  An LLM agent manages a wheat growing season — deciding when to irrigate,
  fertilize (regular or slow-release), harvest, inspect, or wait to maximize yield while minimizing water
  use and cost. Tasks progress from full numeric observability (Tier 1) through
  coarsened bands and NL weather (Tier 2) to bucketed weather with most sensors
  hidden (Tier 3). Two inspect actions reveal exact sensor readings at a budget
  and time cost. Uses a WOFOST-inspired crop growth simulator with deterministic weather.
author: Team Hijibiji

environment:
  type: openenv
  app_port: 7860
  entry_point: server.environment:CropEnvironment
  action_model: models:CropAction
  observation_model: models:CropObservation
  state_model: models:CropState
  configs_dir: configs/

tasks:
  - name: Basic Crop Growth
    difficulty: easy
    observability_tier: 1
    objective: Manage wheat growth with generous budget and full sensor data — fertilize at right stages and harvest at maturity.
  - name: Water-Efficient Farming
    difficulty: medium
    observability_tier: 2
    objective: Balance yield against water conservation with partial information — DVS and soil moisture hidden behind bands, weather as NL summary.
  - name: Precision Agriculture
    difficulty: hard
    observability_tier: 3
    objective: Maximize yield under tight budget and information scarcity — most sensors hidden, bucketed weather, inspect actions reveal precision at a cost.

api:
  endpoints:
    - /health
    - /reset
    - /step
    - /state
    - /tasks
    - /baseline
    - /grader
    - /docs
    - /ws

evaluation:
  reward_range:
    min: 0.0
    max: 1.0
  deterministic: true
  rubric:
    type: trajectory
    class: server.rubric:CropManagementRubric
    description: >-
      Multi-metric grading (yield, water efficiency, cost efficiency,
      fertilizer timing, harvest timing) returned as rubric_reward at
      terminal steps per RFC 004.

grading: normalized
reproducible: true

inference:
  script: inference.py
  env_vars:
    - ENV_URL
    - API_BASE_URL
    - MODEL_NAME
    - API_KEY
    - HF_TOKEN
    - TASK_ID
    - SEED
    - TRAJECTORY_OUTPUT

requirements:
  python: ">=3.11"
  dependencies:
    - openenv-core
    - fastapi>=0.115
    - pydantic>=2.7
    - uvicorn>=0.30
    - openai>=1.0
    - httpx>=0.25
    - python-dotenv>=1.0
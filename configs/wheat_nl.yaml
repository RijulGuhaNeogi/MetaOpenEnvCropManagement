# ─────────────────────────────────────────────────────────────
# Winter Wheat — Netherlands (NW-European calibration)
# Source: Boogaard et al. (2014), de Wit et al. (2019)
# ─────────────────────────────────────────────────────────────

crop:
  name: wheat
  display_name: "Winter Wheat (Netherlands)"
  region: NL

  # Phenology
  TBASE: 0.0          # °C — base temperature [Boogaard 2014, Table 4.1]
  TSUM1: 1116.0       # °C·d — emergence → anthesis [de Wit 2019]
  TSUM2: 903.0        # °C·d — anthesis → maturity   [de Wit 2019]

  # Canopy
  SLA0: 0.0022        # ha kg⁻¹ — specific leaf area at emergence
  LAIEM: 0.048        # m² m⁻² — LAI at emergence
  LAI_MAX: 6.0        # m² m⁻² — maximum LAI
  KDIF: 0.60          # extinction coeff. for diffuse PAR (Monsi & Saeki 1953)
  SENESCENCE_DVS: 1.5 # DVS at which leaf senescence begins
  SENESCENCE_RATE: 0.10

  # Biomass
  LUE: 2.8            # g DM MJ⁻¹ PAR (Gallagher & Biscoe 1978)

  # Nitrogen
  N_RECOV: 0.008
  N_LOSS_PRE: 0.0003
  N_LOSS_POST: 0.0015
  N_FACTOR_FLOOR: 0.30
  N_FACTOR_INIT: 0.55

  # Heat stress — flowering
  HEAT_FLOWER_THRESH: 35.0
  HEAT_FLOWER_SLOPE: 0.15
  HEAT_FLOWER_FLOOR: 0.30
  HEAT_FLOWER_DVS: [0.8, 1.2]

  # Heat stress — grain fill
  HEAT_GRAIN_THRESH: 32.0
  HEAT_GRAIN_SLOPE: 0.035
  HEAT_GRAIN_FLOOR: 0.80
  HEAT_GRAIN_DVS: [1.0, 1.5]

  # Evapotranspiration (Hargreaves)
  ET_COEFF: 0.0023
  ET_TCONST: 17.8
  ET_RAD_CONV: 0.408
  KC_MAX: 1.20
  KC_BASE: 0.30
  KC_LAI_SLOPE: 0.15

  # Water stress (Feddes)
  WS_RATIO_FULL: 0.6
  WS_RATIO_MID: 0.2
  WS_FLOOR: 0.1

  # Partitioning table (DVS → fraction to grain)
  FOTB:
    - [0.0, 0.00]
    - [0.5, 0.00]
    - [1.0, 0.05]
    - [1.3, 0.40]
    - [1.6, 0.70]
    - [2.0, 0.85]

soil:
  name: clay_loam
  display_name: "Clay Loam"
  SMFCF: 0.43         # cm³ cm⁻³ — field capacity [Wösten 2001]
  SMW: 0.20           # cm³ cm⁻³ — wilting point
  SM_INIT: 0.38       # cm³ cm⁻³ — initial soil moisture
  RDMSOL: 100.0       # cm — maximum rooting depth
